<div class="admin-users">
    <div class="header">
        <h3>User Management</h3>
        <div class="actions">
            <button class="btn btn-primary" (click)="creating = !creating">
                {{ creating ? 'Cancel' : 'Create user' }}
            </button>
            <button class="btn btn-secondary" (click="refresh()">Refresh</button>
        </div>
    </div>

    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <!-- Create form -->
    <div *ngIf="creating" class="card create-card">
        <h4>Create new user</h4>
        <div class="form-row">
            <div class="form-group">
                <label>Username</label>
                <input class="form-control" [(ngModel)]="newUser.username" minlength="3" maxlength="128">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input class="form-control" type="password" [(ngModel)]="newUser.password" minlength="8">
            </div>
            <div class="form-group">
                <label>Email (optional)</label>
                <input class="form-control" type="email" [(ngModel)]="newUser.email">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select class="form-control" [(ngModel)]="newUser.role">
                    <option value="user">user</option>
                    <option value="admin">admin</option>
                </select>
            </div>
        </div>
        <button class="btn btn-success" (click)="createUser()" [disabled]="!newUser.username || !newUser.password">
            Create
        </button>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="muted">Loading users...</div>

    <!-- User table -->
    <table *ngIf="!loading && users.length > 0" class="table">
        <thead>
            <tr>
                <th>Username</th>
                <th>User ID</th>
                <th>Role</th>
                <th>Source</th>
                <th>Status</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let u of users">
                <td>{{ u.username }}</td>
                <td class="muted">{{ u.userId }}</td>
                <td>
                    <select class="form-control role-select" [ngValue]="u.role" (change)="changeRole(u, $event.target.value)">
                        <option value="user">user</option>
                        <option value="admin">admin</option>
                    </select>
                </td>
                <td>{{ provideOidc(u) }}</td>
                <td>
                    <span class="badge" [ngClass]="u.isActive ? 'badge-success' : 'badge-danger'">
                        {{ u.isActive ? 'active' : 'disabled' }}
                    </span>
                </td>
                <td class="muted">{{ u.createdAt | date:'short' }}</td>
                <td class="actions">
                    <button class="btn btn-sm btn-warning" (click)="toggleActive(u)">
                        {{ u.isActive ? 'Disable' : 'Enable' }}
                    </button>
                    <button class="btn btn-sm btn-info" (click="resetPassword(u)">Reset PW</button>
                    <button class="btn btn-sm btn-danger" (click="deleteUser(u)">Delete</button>
                </td>
            </tr>
        </tbody>
    </table>

    <div *ngIf="!loading && users.length === 0" class="muted">
        No users found. Create one above.
    </div>
</div>
